<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Web AR Tanglung Demo (Debug Mode)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        
        #ui-container {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center; z-index: 999;
        }

        #ar-button {
            padding: 12px 24px; font-size: 16px; font-weight: bold;
            background-color: #ffffff; color: #333; border: none; border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: pointer;
        }

        #ar-button:disabled { background-color: #cccccc; color: #666; }

        /* On-screen console to catch blank screen errors */
        #debug-console {
            width: 90%; max-height: 150px; overflow-y: auto; background: rgba(0, 0, 0, 0.7);
            color: #00ff00; font-family: monospace; font-size: 12px; padding: 10px;
            margin-bottom: 15px; border-radius: 8px; box-sizing: border-box;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <div id="debug-console">System Initializing...<br></div>
        <button id="ar-button">Check AR Support...</button>
    </div>

    <script>
        const arButton = document.getElementById('ar-button');
        const debugConsole = document.getElementById('debug-console');

        // Helper to print errors to the phone screen
        function log(message) {
            console.log(message);
            debugConsole.innerHTML += `> ${message}<br>`;
            debugConsole.scrollTop = debugConsole.scrollHeight;
        }

        let xrSession = null;
        let gl = null;
        let renderer = null;
        let scene = null;
        let camera = null;
        let hitTestSource = null;
        let localSpace = null;
        let reticle = null;

        // 1. Initial Check: Is it HTTPS or Localhost?
        if (window.location.protocol === 'file:') {
            log("ERROR: WebXR blocks file:// URLs. You must use a local server (localhost) or HTTPS.");
            arButton.textContent = "URL Protocol Error";
            arButton.disabled = true;
        } 
        // 2. Check if browser supports WebXR
        else if (navigator.xr) {
            log("WebXR API detected.");
            navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                if (supported) {
                    log("Immersive AR is supported by this device!");
                    arButton.textContent = 'Start AR Experience';
                    arButton.addEventListener('click', onButtonClicked);
                } else {
                    log("ERROR: This device/browser does not support immersive-ar (Are you on iOS?)");
                    arButton.textContent = 'AR Not Supported';
                    arButton.disabled = true;
                }
            }).catch(err => {
                log(`Support check error: ${err.message}`);
            });
        } else {
            log("ERROR: WebXR API is completely missing. Requires Chrome on Android.");
            arButton.textContent = 'WebXR Missing';
            arButton.disabled = true;
        }

        function onButtonClicked() {
            if (!xrSession) {
                log("Requesting AR session...");
                navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test', 'local-floor']
                }).then(onSessionStarted).catch(err => {
                    log(`SESSION ERROR: ${err.message}`);
                    log("Did you grant camera permissions?");
                });
            }
        }

        function onSessionStarted(session) {
            log("AR Session started successfully!");
            xrSession = session;
            arButton.style.display = 'none'; // Hide button

            const canvas = document.createElement('canvas');
            gl = canvas.getContext('webgl', { xrCompatible: true });
            
            renderer = new THREE.WebGLRenderer({ alpha: true, preserveDrawingBuffer: true, canvas: canvas, context: gl });
            renderer.autoClear = false;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera();
            camera.matrixAutoUpdate = false;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(10, 15, 10);
            scene.add(directionalLight);

            // The Reticle (targeting ring)
            const geometry = new THREE.RingGeometry(0.1, 0.11, 32).rotateX(-Math.PI / 2);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            reticle = new THREE.Mesh(geometry, material);
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            session.updateRenderState({ baseLayer: new XRWebGLLayer(session, gl) });

            session.requestReferenceSpace('local-floor').then((refSpace) => {
                localSpace = refSpace;
                session.requestHitTestSource({ space: session.viewerSpace }).then((source) => {
                    hitTestSource = source;
                    log("Surface tracking initialized.");
                }).catch(err => log(`Hit Test Error: ${err.message}`));
            }).catch(err => log(`Space Error: ${err.message}`));

            session.addEventListener('select', onSelect);
            session.requestAnimationFrame(onXRFrame);
        }

        function onSelect() {
            if (reticle.visible) {
                log("Tap detected. Spawning Tanglung!");
                const lanternGeometry = new THREE.CylinderGeometry(0.1, 0.1, 0.3, 16);
                const lanternMaterial = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.4 });
                const lantern = new THREE.Mesh(lanternGeometry, lanternMaterial);
                lantern.position.setFromMatrixPosition(reticle.matrix);
                scene.add(lantern);
            } else {
                log("Tap detected, but no surface found yet.");
            }
        }

        function onXRFrame(time, frame) {
            const session = frame.session;
            session.requestAnimationFrame(onXRFrame);
            gl.bindFramebuffer(gl.FRAMEBUFFER, session.renderState.baseLayer.framebuffer);

            const pose = frame.getViewerPose(localSpace);
            if (pose) {
                const view = pose.views[0];
                const viewport = session.renderState.baseLayer.getViewport(view);
                renderer.setSize(viewport.width, viewport.height);

                camera.projectionMatrix.fromArray(view.projectionMatrix);
                const viewMatrix = new THREE.Matrix4().fromArray(view.transform.inverse.matrix);
                camera.matrix.copy(viewMatrix).invert();
                camera.updateMatrixWorld(true);

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const hitPose = hit.getPose(localSpace);
                        reticle.visible = true;
                        reticle.matrix.fromArray(hitPose.transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
                renderer.render(scene, camera);
            }
        }
    </script>
</body>
</html>
