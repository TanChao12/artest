<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Web AR Tanglung Festival Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: sans-serif;
        }
        #ar-button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            font-size: 16px;
            background-color: #ffffff;
            border: none;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 999;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <button id="ar-button">Start AR Experience</button>

    <script>
        let xrSession = null;
        let gl = null;
        let renderer = null;
        let scene = null;
        let camera = null;
        let hitTestSource = null;
        let localSpace = null;
        let reticle = null; // A visual ring showing where the object will land

        const arButton = document.getElementById('ar-button');

        // 1. Check if WebXR AR is supported by the browser
        if (navigator.xr) {
            navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                if (supported) {
                    arButton.addEventListener('click', onButtonClicked);
                } else {
                    arButton.textContent = 'AR Not Supported on this Browser';
                    arButton.disabled = true;
                }
            });
        } else {
            arButton.textContent = 'WebXR Not Available';
            arButton.disabled = true;
        }

        function onButtonClicked() {
            if (!xrSession) {
                // Request an immersive AR session with hit-test (surface detection) capabilities
                navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test', 'local-floor']
                }).then(onSessionStarted);
            }
        }

        function onSessionStarted(session) {
            xrSession = session;
            arButton.style.display = 'none';

            // Create WebGL context and bind it to WebXR
            const canvas = document.createElement('canvas');
            gl = canvas.getContext('webgl', { xrCompatible: true });
            
            renderer = new THREE.WebGLRenderer({ alpha: true, preserveDrawingBuffer: true, canvas: canvas, context: gl });
            renderer.autoClear = false;

            // Initialize Three.js Scene and Camera
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera();
            camera.matrixAutoUpdate = false;

            // Add Environment Lights (Crucial for 3D realism)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(10, 15, 10);
            scene.add(directionalLight);

            // Create a Reticle (a ring indicating surface detection)
            const geometry = new THREE.RingGeometry(0.1, 0.11, 32).rotateX(-Math.PI / 2);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            reticle = new THREE.Mesh(geometry, material);
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Initialize XR layers
            session.updateRenderState({ baseLayer: new XRWebGLLayer(session, gl) });

            // Setup local tracking spaces
            session.requestReferenceSpace('local-floor').then((refSpace) => {
                localSpace = refSpace;
                session.requestHitTestSource({ space: session.viewerSpace }).then((source) => {
                    hitTestSource = source;
                });
            });

            // Handle user taps to place an object
            session.addEventListener('select', onSelect);

            // Start the AR render loop
            session.requestAnimationFrame(onXRFrame);
        }

        function onSelect() {
            if (reticle.visible) {
                // Create a basic 3D representation of a lantern (cylinder)
                const lanternGeometry = new THREE.CylinderGeometry(0.1, 0.1, 0.3, 16);
                const lanternMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xcc0000, // Red lantern base
                    roughness: 0.4,
                    metalness: 0.1
                });
                const lantern = new THREE.Mesh(lanternGeometry, lanternMaterial);

                // Set position of the new object to match the current position of the reticle
                lantern.position.setFromMatrixPosition(reticle.matrix);
                scene.add(lantern);
            }
        }

        function onXRFrame(time, frame) {
            const session = frame.session;
            session.requestAnimationFrame(onXRFrame);

            // Bind the correct framebuffer
            gl.bindFramebuffer(gl.FRAMEBUFFER, session.renderState.baseLayer.framebuffer);

            // Get the user's current spatial pose
            const pose = frame.getViewerPose(localSpace);
            if (pose) {
                const view = pose.views[0];
                const viewport = session.renderState.baseLayer.getViewport(view);
                renderer.setSize(viewport.width, viewport.height);

                // Sync Three.js camera with WebXR tracking matrices
                camera.projectionMatrix.fromArray(view.projectionMatrix);
                const viewMatrix = new THREE.Matrix4().fromArray(view.transform.inverse.matrix);
                camera.matrix.copy(viewMatrix).invert();
                camera.updateMatrixWorld(true);

                // Perform surface hit testing
                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const hitPose = hit.getPose(localSpace);

                        reticle.visible = true;
                        reticle.matrix.fromArray(hitPose.transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }

                // Render the 3D overlay scene
                renderer.render(scene, camera);
            }
        }
    </script>
</body>
</html>
